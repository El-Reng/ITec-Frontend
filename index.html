<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rojo Leonel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center pb-10 pt-5">
    <header class="flex w-full justify-around items-center gap-4 mb-6">

        <button id="HomeButton" class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-400">
            🏠 Home
        </button>

        <h1 class="text-3xl font-bold text-gray-800">
            Practico 01
        </h1>

        <button id="ProfileButton" class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-400">
            👤 Perfil
        </button>

    </header>

    <section class="flex flex-col sm:flex-row gap-4 items-center mb-6">
        <input id="SearchInput" type="text" placeholder="Buscar álbum...">
        <button id="SearchButton" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">Buscar</button>
    </section>

    <section id="HeaderContainer" class="w-full max-w-6xl px-4 mb-4">
    </section>

    <section id="AlbumsContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-4 w-full max-w-6xl">
    </section>

    <script src="script.js"></script>
</body>
</html>
